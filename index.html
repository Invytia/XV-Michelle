<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Michelle XV | Invytia Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@200;400;600&family=Great+Vibes&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --azul-pantone: #9CCFEF; 
            --azul-claro: #E4F1FA;
            --azul-texto: #12284D;
        }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--azul-claro); color: var(--azul-texto); margin: 0; overflow-x: hidden; }
        .font-name { font-family: 'Playfair Display', serif; text-transform: none !important; }
        .font-cursive { font-family: 'Great Vibes', cursive; }
        
        /* --- SOBRE PREMIUM (AJUSTADO) --- */
        #envelope-wrapper { perspective: 1000px; position: relative; z-index: 60; }
        #envelope {
            width: 320px; height: 220px; background: white; position: relative;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15); border-radius: 0 0 12px 12px;
            display: flex; align-items: center; justify-content: center;
        }
        #flap {
            position: absolute; top: 0; left: 0; width: 0; height: 0;
            border-left: 160px solid transparent; border-right: 160px solid transparent;
            /* Se ajustó la altura de 110px a 95px para no interferir con el texto */
            border-top: 95px solid var(--azul-pantone); 
            transform-origin: top;
            transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1); z-index: 2;
        }
        .open #flap { transform: rotateX(180deg); }

        /* Contenedor de texto dentro del sobre para asegurar lectura limpia */
        .envelope-content {
            position: relative;
            z-index: 1;
            padding-top: 40px; /* Empuja el texto hacia abajo de la pestaña */
            text-align: center;
        }

        /* --- STICKY AUDIO --- */
        #music-control {
            position: fixed; bottom: 25px; right: 25px; z-index: 200;
            padding: 12px 24px; background: white; border-radius: 50px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); cursor: pointer; display: none;
            font-size: 10px; font-weight: 800; letter-spacing: 2px;
            border: 1px solid var(--azul-pantone);
        }

        /* --- MARIPOSAS --- */
        .butterfly-img {
            position: absolute; pointer-events: none; z-index: 20;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
            animation: aleteo 0.5s ease-in-out infinite alternate;
        }
        @keyframes aleteo { from { transform: scaleX(1) rotate(0deg); } to { transform: scaleX(0.7) rotate(5deg); } }
        .floating-bg { animation: moveSlow 25s linear infinite; opacity: 0.5; }
        @keyframes moveSlow {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(15vw, -10vh) rotate(10deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        /* --- ANIMACIONES ITINERARIO --- */
        .anim-slide-right { opacity: 0; transform: translateX(-40px); transition: all 0.8s ease-out; }
        .anim-slide-left { opacity: 0; transform: translateX(40px); transition: all 0.8s ease-out; }
        .anim-slide-right.visible, .anim-slide-left.visible { opacity: 1; transform: translateX(0); }

        #main-content { opacity: 0; transition: opacity 1.5s ease; }
        .show-content { opacity: 1 !important; }
    </style>
</head>
<body class="overflow-hidden">

    <audio id="invite-music" loop><source src="assets/song.mp3" type="audio/mpeg"></audio>

    <div id="music-control" onclick="toggleMusic()"><span id="music-text">PAUSAR</span></div>

    <div id="opening-overlay" class="fixed inset-0 z-[100] bg-[#E1EFFE] flex flex-col items-center justify-center transition-opacity duration-1000">
        <div id="envelope-wrapper">
            <div id="envelope">
                <div id="flap"></div>
                <div class="envelope-content">
                    <p class="font-cursive text-2xl text-blue-500">Mis XV Años</p>
                    <h2 class="font-cursive text-4xl text-blue-900 mt-1">Michelle</h2>
                </div>
            </div>
        </div>
        <button onclick="iniciarApertura()" id="btn-abrir" class="mt-12 px-10 py-3 bg-white text-blue-600 rounded-full shadow-lg font-bold tracking-[0.2em] text-xs hover:scale-105 transition-all">
            ABRIR INVITACIÓN
        </button>
    </div>

    <main id="main-content" class="hidden relative">
        <section class="relative h-[95vh] w-full flex items-end justify-center pb-12">
            <img src="assets/hero.jpg" alt="Michelle" class="absolute inset-0 w-full h-full object-cover">
            <div class="absolute inset-0 bg-gradient-to-t from-[var(--azul-claro)] via-[var(--azul-claro)]/80 to-transparent/10"></div>
            <div class="relative text-center drop-shadow-md">
                <p class="font-cursive text-4xl md:text-5xl text-blue-600">Mis XV Años</p>
                <h1 class="font-cursive text-7xl md:text-9xl text-blue-900 mt-2">Michelle</h1>
            </div>
        </section>

        <section class="py-10 bg-white text-center">
            <div id="countdown" class="flex justify-center gap-3 md:gap-8 px-4">
                <div class="flex flex-col items-center justify-center bg-[#F0F7FF]/50 backdrop-blur-md border border-blue-100 shadow-[0_8px_20px_rgba(0,0,0,0.06)] rounded-2xl w-20 h-24 md:w-24 md:h-28">
                    <span id="days" class="font-name text-3xl md:text-4xl text-blue-900">00</span>
                    <span class="text-[10px] uppercase tracking-widest text-blue-600 mt-1">Días</span>
                </div>
                <div class="flex flex-col items-center justify-center bg-[#F0F7FF]/50 backdrop-blur-md border border-blue-100 shadow-[0_8px_20px_rgba(0,0,0,0.06)] rounded-2xl w-20 h-24 md:w-24 md:h-28">
                    <span id="hours" class="font-name text-3xl md:text-4xl text-blue-900">00</span>
                    <span class="text-[10px] uppercase tracking-widest text-blue-600 mt-1">Hrs</span>
                </div>
                <div class="flex flex-col items-center justify-center bg-[#F0F7FF]/50 backdrop-blur-md border border-blue-100 shadow-[0_8px_20px_rgba(0,0,0,0.06)] rounded-2xl w-20 h-24 md:w-24 md:h-28">
                    <span id="minutes" class="font-name text-3xl md:text-4xl text-blue-900">00</span>
                    <span class="text-[10px] uppercase tracking-widest text-blue-600 mt-1">Min</span>
                </div>
                <div class="flex flex-col items-center justify-center bg-[#F0F7FF]/50 backdrop-blur-md border border-blue-100 shadow-[0_8px_20px_rgba(0,0,0,0.06)] rounded-2xl w-20 h-24 md:w-24 md:h-28">
                    <span id="seconds" class="font-name text-3xl md:text-4xl text-blue-900">00</span>
                    <span class="text-[10px] uppercase tracking-widest text-blue-600 mt-1">Seg</span>
                </div>
            </div>
        </section>

        <section class="py-16 text-center relative bg-[var(--azul-claro)]">
            <div class="absolute inset-0 z-0 opacity-20">
                <img src="assets/salon.jpg" alt="Salón" class="w-full h-full object-cover">
            </div>
            <div class="relative z-10">
                <h2 class="font-name text-4xl text-blue-900">24 de Octubre</h2>
                <p class="text-blue-700 font-bold mt-4">Recepción - Salón Villagrand (salón 1)</p>
                <div class="max-w-4xl mx-auto h-72 bg-white/70 backdrop-blur-sm rounded-3xl overflow-hidden border border-blue-200 my-8 shadow-sm">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3734.123!2d-100.44!3d20.6!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMjDCsDM2JzAwLjAiTiAxMDDCsDI2JzI0LjAiVw!5e0!3m2!1ses-419!2smx!4v1700000000000" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                </div>
                <a href="#" target="_blank" class="px-8 py-3 bg-blue-600 text-white rounded-full text-[10px] tracking-widest font-bold shadow-lg">VER EN MAPA</a>
            </div>
        </section>

        <section class="py-16 px-6 text-center bg-white">
            <h2 class="font-name text-3xl text-blue-900 mb-10">Itinerario</h2>
            <div class="max-w-md mx-auto space-y-8 text-left border-l-2 border-blue-100 pl-8">
                <div class="relative anim-slide-right">
                    <div class="absolute -left-[41px] top-1 w-4 h-4 rounded-full bg-blue-300"></div>
                    <p class="font-name text-blue-900 text-lg flex items-center gap-2"><span>🥂</span> 5:15 Recepción</p>
                </div>
                <div class="relative anim-slide-left">
                    <div class="absolute -left-[41px] top-1 w-4 h-4 rounded-full bg-blue-400"></div>
                    <p class="font-name text-blue-900 text-lg flex items-center gap-2"><span>⛪</span> 5:30 Ceremonia</p>
                </div>
                <div class="relative anim-slide-right">
                    <div class="absolute -left-[41px] top-1 w-4 h-4 rounded-full bg-blue-300"></div>
                    <p class="font-name text-blue-900 text-lg flex items-center gap-2"><span>🍽️</span> 7:00 Cena</p>
                </div>
            </div>
        </section>

        <footer class="py-10 text-center text-[9px] tracking-[0.5em] text-gray-400">INVYTIA PLATINUM EXPERIENCE</footer>
    </main>

    <script>
        const audio = document.getElementById('invite-music');
        const musicText = document.getElementById('music-text');

        function iniciarApertura() {
            document.getElementById('envelope-wrapper').classList.add('open');
            document.getElementById('btn-abrir').style.display = 'none';
            audio.play().catch(e => console.log("Audio deferred"));
            document.getElementById('music-control').style.display = 'flex';
            
            setTimeout(() => {
                document.getElementById('opening-overlay').style.opacity = '0';
                document.getElementById('main-content').classList.remove('hidden');
                initObserver();
                setTimeout(() => {
                    document.getElementById('opening-overlay').style.display = 'none';
                    document.getElementById('main-content').classList.add('show-content');
                    document.body.style.overflowY = 'auto';
                    startCountdown();
                }, 1000);
            }, 2000);
        }

        function initObserver() {
            const observer = new IntersectionObserver(entries => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) entry.target.classList.add('visible');
                });
            }, { threshold: 0.1 });
            document.querySelectorAll('.anim-slide-right, .anim-slide-left').forEach(el => observer.observe(el));
        }

        function startCountdown() {
            const target = new Date("Oct 24, 2026 17:15:00").getTime();
            setInterval(() => {
                const now = new Date().getTime();
                const dist = target - now;
                if (dist > 0) {
                    document.getElementById("days").innerText = Math.floor(dist / (1000 * 60 * 60 * 24));
                    document.getElementById("hours").innerText = Math.floor((dist % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    document.getElementById("minutes").innerText = Math.floor((dist % (1000 * 60 * 60)) / (1000 * 60));
                    document.getElementById("seconds").innerText = Math.floor((dist % (1000 * 60)) / 1000);
                }
            }, 1000);
        }

        function toggleMusic() {
            if (audio.paused) { audio.play(); musicText.innerText = "PAUSAR"; }
            else { audio.pause(); musicText.innerText = "REANUDAR"; }
        }
    </script>
</body>
</html>
